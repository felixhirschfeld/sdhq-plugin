name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    tags:
      - 'v*.*.*'

jobs:
  build_plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm run build

      - name: Package release artifacts
        run: |
          rm -f sdhq-plugin.tar.gz sdhq-plugin.zip
          stage_dir="$(mktemp -d)"
          mkdir -p "${stage_dir}/sdhq-plugin"

          cp -R dist "${stage_dir}/sdhq-plugin/"
          cp main.py package.json plugin.json README.md LICENSE "${stage_dir}/sdhq-plugin/"

          tar -czf sdhq-plugin.tar.gz -C "${stage_dir}" sdhq-plugin
          (
            cd "${stage_dir}"
            zip -rq "${OLDPWD}/sdhq-plugin.zip" sdhq-plugin
          )

      - name: Show packaged files
        run: |
          echo "=== tar.gz contents ==="
          tar -tzf sdhq-plugin.tar.gz
          echo ""
          echo "=== zip contents ==="
          unzip -l sdhq-plugin.zip

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdhq-plugin-release
          path: |
            sdhq-plugin.tar.gz
            sdhq-plugin.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build_plugin
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdhq-plugin-release
          path: /tmp/sdhq-plugin-release

      - name: Publish to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/sdhq-plugin-release/sdhq-plugin.tar.gz
            /tmp/sdhq-plugin-release/sdhq-plugin.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'pre') || contains(github.ref_name, '.rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
